<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>QR Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{ --accent:#2c7be5; --bg:#f7f9fc; --card:#fff; --muted:#6b7280; --radius:10px; --gap:12px; font-family:Inter,Arial,Helvetica,sans-serif; }
  html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg),#eef4fb);color:#0f172a;}
  .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:32px 16px;box-sizing:border-box;}
  .card{width:100%;max-width:420px;background:var(--card);border-radius:var(--radius);box-shadow:0 8px 30px rgba(15,23,42,0.08);padding:22px;text-align:center;}
  h1{margin:0 0 12px 0;font-size:20px;}
  p.lead{margin:0 0 18px 0;color:var(--muted);font-size:13px;}
  form{display:grid;gap:var(--gap);margin-bottom:14px;}
  label{display:block;text-align:left;font-size:13px;color:var(--muted);margin-bottom:6px;}
  input[type="url"],input[type="text"]{width:100%;padding:12px 14px;border:1px solid #e6eef8;border-radius:8px;font-size:14px;outline:none;}
  input:focus{border-color:var(--accent);box-shadow:0 4px 18px rgba(44,123,229,0.12);}
  .controls{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;}
  button.generate{background:var(--accent);color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:600;flex:1 1 auto;min-width:140px;}
  a.download{display:inline-block;text-decoration:none;background:#0b1220;color:#fff;padding:10px 14px;border-radius:8px;font-weight:600;margin-top:12px;opacity:0;transition:opacity .25s ease;}
  a.download.show{opacity:1;}
  .preview{margin-top:16px;display:flex;align-items:center;justify-content:center;gap:12px;flex-direction:column;}
  #qrcode{background:#fff;border-radius:8px;box-shadow:0 6px 18px rgba(15,23,42,0.06);width:100%;max-width:300px;padding:12px;box-sizing:border-box;}
  .note{font-size:12px;color:var(--muted);margin-top:8px;}
  @media (max-width:420px){ .card{padding:18px;} h1{font-size:18px;} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="region" aria-labelledby="title">
      <h1 id="title">QR Generator</h1>
      <p class="lead">Enter a link and download the generated QR code as PNG.</p>

      <form id="qrForm" onsubmit="return false;" novalidate>
        <div>
          <label for="link">Link</label>
          <input id="link" type="url" inputmode="url" placeholder="https://example.com" required aria-required="true" />
        </div>

        <div>
          <label for="filename">Filename</label>
          <input id="filename" type="text" placeholder="qr-code" />
        </div>

        <div class="controls">
          <button id="generateBtn" class="generate" type="button">Generate</button>
          <button id="clearBtn" class="generate" type="button" style="background:#e6eef8;color:#0f172a;min-width:90px;">Clear</button>
        </div>
      </form>

      <div class="preview" aria-live="polite">
        <div id="qrcode" aria-hidden="false"></div>
        <a id="downloadBtn" class="download" style="display:inline-block" download>Download QR</a>
        <div class="note">Tip: Use a short URL for better scanning reliability.</div>
      </div>
    </div>
  </div>

<script>
(function(){
  const linkInput = document.getElementById('link');
  const filenameInput = document.getElementById('filename');
  const qrContainer = document.getElementById('qrcode');
  const generateBtn = document.getElementById('generateBtn');
  const clearBtn = document.getElementById('clearBtn');
  const downloadBtn = document.getElementById('downloadBtn');

  let currentObjectUrl = null;

  function sanitizeFilename(name){
    // remove path chars and keep safe chars
    return name.replace(/[^a-z0-9_\-\.]/gi, '_').replace(/_+/g,'_') || 'qr-code';
  }

  function hideDownload(){
    downloadBtn.classList.remove('show');
    downloadBtn.removeAttribute('href');
    downloadBtn.removeAttribute('download');
  }

  function revokeCurrentUrl(){
    if(currentObjectUrl){
      URL.revokeObjectURL(currentObjectUrl);
      currentObjectUrl = null;
    }
  }

  function prepareDownloadFromRendered(){
    // look for canvas first, then img
    const canvas = qrContainer.querySelector('canvas');
    const img = qrContainer.querySelector('img');

    try{
      if(canvas && canvas.toDataURL){
        const data = canvas.toDataURL('image/png');
        downloadBtn.href = data;
        downloadBtn.download = sanitizeFilename((filenameInput.value.trim() || 'qr-code')) + '.png';
        downloadBtn.classList.add('show');
        return true;
      } else if(img && img.src){
        // convert image src (data: or blob:) to object URL if needed
        // if it's already data:, just use it
        if(img.src.startsWith('data:')){
          downloadBtn.href = img.src;
          downloadBtn.download = sanitizeFilename((filenameInput.value.trim() || 'qr-code')) + '.png';
          downloadBtn.classList.add('show');
          return true;
        } else {
          // fetch the image and create object URL
          fetch(img.src).then(r=>r.blob()).then(blob=>{
            revokeCurrentUrl();
            currentObjectUrl = URL.createObjectURL(blob);
            downloadBtn.href = currentObjectUrl;
            downloadBtn.download = sanitizeFilename((filenameInput.value.trim() || 'qr-code')) + '.png';
            downloadBtn.classList.add('show');
          }).catch(err=>{
            console.error('Could not prepare download from img:', err);
          });
          return true;
        }
      }
    }catch(e){
      console.error('prepareDownload error', e);
    }
    return false;
  }

  function clearQr(){
    revokeCurrentUrl();
    qrContainer.innerHTML = '';
    hideDownload();
  }

  generateBtn.addEventListener('click', function(){
    const link = linkInput.value.trim();
    const filename = sanitizeFilename((filenameInput.value.trim() || 'qr-code')) + '.png';
    hideDownload();

    if(!link){
      alert('Please enter a link to generate a QR code.');
      linkInput.focus();
      return;
    }

    // basic URL validation
    try{
      const u = new URL(link);
      if(u.protocol !== 'http:' && u.protocol !== 'https:'){
        throw new Error('Invalid protocol');
      }
    }catch(e){
      alert('Please enter a valid URL starting with http:// or https://');
      linkInput.focus();
      return;
    }

    // clear previous
    qrContainer.innerHTML = '';

    // create QR (qrcodejs)
    const qr = new QRCode(qrContainer, {
      text: link,
      width: 300,
      height: 300,
      correctLevel: QRCode.CorrectLevel.H
    });

    // Wait for the library to render; then prepare download.
    // Instead of a blind timeout, poll for canvas/img presence for up to 1s.
    const start = Date.now();
    const poll = setInterval(()=>{
      if(prepareDownloadFromRendered()){
        clearInterval(poll);
      } else if(Date.now() - start > 1000){
        clearInterval(poll);
        // final attempt: try once more and if still nothing, show a console warning
        if(!prepareDownloadFromRendered()){
          console.warn('QR rendered but could not prepare download automatically.');
        }
      }
    }, 80);
  });

  clearBtn.addEventListener('click', clearQr);

  // Enter key triggers generation
  linkInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ e.preventDefault(); generateBtn.click(); }
  });

  // cleanup on unload
  window.addEventListener('unload', revokeCurrentUrl);
})();
</script>
</body>
</html>
